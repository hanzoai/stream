name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hanzoai/kafka

jobs:
  lint-and-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go build ./...
      - run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-vet
    continue-on-error: true
    env:
      GO_VERSION: '1.23'
      JAVA_VERSION: '17'
      KAFKA_VERSION: '3.9.0'
      SCALA_VERSION: '2.13'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install PubSub server
        run: |
          curl -sL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/

      - name: Start PubSub with Hanzo Stream
        run: |
          nats-server --jetstream --store_dir /tmp/pubsub-data &
          sleep 2

      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download Kafka CLI tools
        run: |
          KAFKA_TAR="kafka_${SCALA_VERSION}-${KAFKA_VERSION}.tgz"
          curl -sO "https://dlcdn.apache.org/kafka/${KAFKA_VERSION}/${KAFKA_TAR}"
          tar -xzf "${KAFKA_TAR}"
          sudo mv "kafka_${SCALA_VERSION}-${KAFKA_VERSION}" /opt/kafka

      - name: Run e2e tests
        run: |
          export KAFKA_BIN_DIR=/opt/kafka/bin
          go test -v -count=1 -timeout 3m ./test/e2e/...

      - name: Run cluster tests
        run: |
          export KAFKA_BIN_DIR=/opt/kafka/bin
          go test -v -count=1 -timeout 3m ./test/cluster/...

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-and-vet]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
